<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Offer</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Nunito Sans', sans-serif;
    background: #f5f5f5;
    margin: 0;
}

.products {
    padding: 20px;
    max-width: 1000px;
    margin: auto;
}

.title {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    margin-bottom: 25px;
    color: #555;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    background: white;
    border-radius: 10px;
    width: 300px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    border: 2px solid transparent;
}

.card.best {
    border: 2px solid #00c853;
    transform: scale(1.05);
}

.badge {
    background: #ff0000;
    color: white;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: bold;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 10px;
}

.best .badge {
    background: #00c853;
}

.bottles {
    font-size: 22px;
    font-weight: 800;
}

.price-old {
    text-decoration: line-through;
    color: #999;
}

.price {
    font-size: 26px;
    font-weight: 800;
    margin: 5px 0;
}

.shipping {
    font-size: 14px;
    margin-bottom: 15px;
}

.btn {
    display: block;
    background: #ff0000;
    color: white;
    text-decoration: none;
    padding: 12px;
    border-radius: 6px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #cc0000;
}

.best .btn {
    background: #00c853;
}

.best .btn:hover {
    background: #009624;
}

@media (max-width: 768px) {
    .grid {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<section class="products">

    <div class="title">Claim Your Discounted NeuroSilence</div>
    <div class="subtitle">Limited stock available – act now</div>

    <div class="grid">

        <!-- 6 Bottles -->
        <div class="card best">
            <div class="badge">BEST VALUE</div>
            <div class="bottles">6 BOTTLES</div>
            <p>180 Day Supply</p>
            <div class="price-old">$588</div>
            <div class="price">$294</div>
            <div class="shipping">Free Shipping</div>
            <a href="https://lp.neutrau.site/click/2" class="btn">BUY NOW</a>
        </div>

        <!-- 3 Bottles -->
        <div class="card">
            <div class="badge">MOST POPULAR</div>
            <div class="bottles">3 BOTTLES</div>
            <p>90 Day Supply</p>
            <div class="price-old">$294</div>
            <div class="price">$217</div>
            <div class="shipping">Free Shipping</div>
            <a href="https://lp.neutrau.site/click/3" class="btn">BUY NOW</a>
        </div>

        <!-- 2 Bottles -->
        <div class="card">
            <div class="badge">BASIC</div>
            <div class="bottles">2 BOTTLES</div>
            <p>60 Day Supply</p>
            <div class="price-old">$217</div>
            <div class="price">$177</div>
            <div class="shipping">+ $9.99 Shipping</div>
            <a href="https://lp.neutrau.site/click/1" class="btn">BUY NOW</a>
        </div>

    </div>

</section>

</body>
</html>
